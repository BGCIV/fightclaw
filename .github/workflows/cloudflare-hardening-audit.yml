name: Cloudflare Hardening Audit

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/server/wrangler.toml"
      - "docs/cloudflare-ops.md"
      - "package.json"
      - "packages/infra/alchemy.run.ts"
      - "pnpm-lock.yaml"
      - "scripts/cloudflare-audit-workers.sh"
  schedule:
    - cron: "17 6 * * *"

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Validate required secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing CLOUDFLARE_ACCOUNT_ID secret."; exit 1; }
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing CLOUDFLARE_API_TOKEN secret."; exit 1; }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Cloudflare hardening audit
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm run audit:cloudflare
